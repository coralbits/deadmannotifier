services:
  deadman-notifier:
    build: .
    image: ghcr.io/coralbits/deadmannotifier:latest
    container_name: deadman-notifier
    environment:
      - RUST_LOG=info
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    restart: unless-stopped
